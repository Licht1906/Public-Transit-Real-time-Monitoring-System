# File mẫu (template). Team members copy file này thành k8s-secrets.yaml
# và điền thông tin thật vào, không commit k8s-secrets.yaml lên git.
apiVersion: v1
kind: Secret
metadata:
  name: transit-secrets
  namespace: transit
type: Opaque
stringData:
  LTA_API_KEY:      "điền_api_key_của_bạn_vào_đây"
  MONGODB_PASSWORD: "Mật_khẩu_mongodb_của_dự_án"
  REDIS_PASSWORD:   "Mật_khẩu_redis_của_dự_án"
